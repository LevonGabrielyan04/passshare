# Controlled FastCGI forwarded headers for Laravel TrustProxies.
# Values are derived from nginx ($remote_addr after real_ip), not client-supplied headers.
# REMOTE_ADDR must be 127.0.0.1 (nginx → PHP-FPM) so TRUSTED_PROXIES=127.0.0.1 matches the upstream proxy.

fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
fastcgi_param HTTP_X_FORWARDED_PROTO $forwarded_proto_resolved;
fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
fastcgi_param HTTP_X_FORWARDED_PORT $forwarded_port;
fastcgi_param REMOTE_ADDR 127.0.0.1;

# Never pass Cloudflare headers through to PHP; Laravel must rely on sanitized X-Forwarded-* only.
fastcgi_param HTTP_CF_CONNECTING_IP "";
fastcgi_param HTTP_CF_VISITOR "";
