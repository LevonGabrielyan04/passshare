# Cloudflare Tunnel origin — only cloudflared (fixed tunnel-network IP) may supply
# CF-Connecting-IP / CF-Visitor. Other Docker peers cannot reach this listener.
# Do not publish app:8080 to the public internet; use the cloudflared service instead.

set_real_ip_from 172.30.200.3/32;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

geo $realip_remote_addr $is_trusted_tunnel_origin {
    default 0;

    172.30.200.3/32 1;
}

map $http_cf_visitor $cf_visitor_scheme {
    default "";
    ~*"scheme":"https" https;
    ~*"scheme":"http" http;
}

map "$is_trusted_tunnel_origin:$cf_visitor_scheme" $tunnel_forwarded_proto {
    default "";
    "1:https" https;
    "1:http" http;
}

map "$is_trusted_tunnel_origin:$http_x_forwarded_proto" $xfp_forwarded_proto {
    default "";
    "1:https" https;
    "1:http" http;
}

map $tunnel_forwarded_proto $forwarded_proto {
    default $xfp_forwarded_proto;
    https https;
    http http;
}

map $forwarded_proto $forwarded_proto_resolved {
    default $forwarded_proto;
    "" $scheme;
}

map $forwarded_proto_resolved $forwarded_port {
    default $server_port;
    https 443;
    http 80;
}
