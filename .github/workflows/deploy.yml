# Build the Docker image, push to GHCR, and deploy to the production server over SSH.
#
# Triggers after the "tests" workflow succeeds on main, or manually via workflow_dispatch.
#
# Required GitHub repository secrets:
#   DEPLOY_HOST       — server hostname or IP
#   DEPLOY_USER       — SSH user on the server (e.g. deploy)
#   DEPLOY_SSH_KEY    — private SSH key (PEM) authorized on the server
#   DEPLOY_PATH       — absolute path to the repo on the server (e.g. /opt/passshare)
#   FLUX_USERNAME     — Livewire Flux license (build-time, same as tests workflow)
#   FLUX_LICENSE_KEY  — Livewire Flux license (build-time)
#
# Server .env must include GHCR_USERNAME and GHCR_TOKEN (PAT with read:packages) for pulling images.
#
# One-time server setup: see docker/bin/deploy.sh header comments.

name: deploy

on:
  workflow_run:
    workflows: [tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.sha.outputs.value }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            flux_username=${{ secrets.FLUX_USERNAME }}
            flux_license_key=${{ secrets.FLUX_LICENSE_KEY }}

      - name: Configure SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.sha.outputs.value }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && \
             APP_IMAGE='${APP_IMAGE}' \
             GHCR_USERNAME='${{ github.actor }}' \
             ./docker/bin/deploy.sh --tunnel"
